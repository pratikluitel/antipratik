<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nepal GenZ Andolan — Commission Report Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link rel="stylesheet" href="../styles.css">
</head>
<body class="kg-body">

<div class="kg-topbar">
  <h1>Nepal Commission Report — Knowledge Graph</h1>
  <div class="kg-search-wrap">
    <input type="text" id="search" placeholder="Search nodes…" oninput="filterSearch(this.value)">
  </div>
  <div class="kg-filters" id="filters"></div>
  <div class="kg-legend" id="legend"></div>
  <span class="kg-count" id="count"></span>
</div>

<div class="kg-canvas-wrap">
  <svg id="graph"></svg>
  <div class="kg-tooltip" id="tooltip"></div>
  <div class="kg-info-panel" id="info-panel">
    <span class="close" onclick="closePanel()">✕</span>
    <div id="panel-content"></div>
  </div>
</div>

<script src="graph.js"></script>
</body>
</html>
