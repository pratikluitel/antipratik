name: Build Check

on:
  push:
    paths:
      - 'app/antipratik-ui/**'

jobs:
  build-check:
    name: Build antipratik-ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/antipratik-ui/package-lock.json

      - name: Install dependencies
        working-directory: app/antipratik-ui
        run: npm ci

      - name: Build
        working-directory: app/antipratik-ui
        env:
          # Disable static export for isolated UI build checks so the workflow
          # can verify the UI compiles without requiring the backend-driven
          # dynamic route params for /[slug].
          # TODO: In the future, consider running the build check with a full dummy backend environment so we can keep static export enabled for better build-time checks.
          NEXT_DISABLE_EXPORT: '1'
        run: npm run build
