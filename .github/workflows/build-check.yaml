name: Build Check

on:
  push:
    paths:
      - 'app/antipratik-ui/**'

jobs:
  build-check:
    name: Build antipratik-ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/antipratik-ui/package-lock.json

      - name: Install dependencies
        working-directory: app/antipratik-ui
        run: npm ci

      - name: Build
        working-directory: app/antipratik-ui
        run: npm run build
