name: Build Check

on:
  push:
    paths:
      - 'app/antipratik-ui/**'

jobs:
  build-check:
    name: Build antipratik-ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/antipratik-ui/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/antipratik-api/go.mod
          cache-dependency-path: app/antipratik-api/go.sum

      - name: Start backend
        run: |
          cd app/antipratik-api
          nohup ANTIPRATIK_PORT=8081 go run . > /tmp/antipratik-api.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -sSf http://127.0.0.1:8081/api/posts >/dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          cat /tmp/antipratik-api.log
          exit 1

      - name: Install dependencies
        working-directory: app/antipratik-ui
        run: npm ci

      - name: Build
        working-directory: app/antipratik-ui
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8081
        run: npm run build
