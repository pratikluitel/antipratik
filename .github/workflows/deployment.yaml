name: Deploy

on:
  push:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-api
  UI_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-ui
  NGINX_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-nginx
  TAG: ${{ github.ref_name == 'prod' && 'prod' || 'dev' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
      sidequests: ${{ steps.filter.outputs.sidequests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'app/antipratik-api/**'
              - 'docker/Dockerfile.api'
            ui:
              - 'app/antipratik-ui/**'
              - 'docker/Dockerfile.ui'
            sidequests:
              - 'sidequests/**'

  build-api-image:
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || github.ref_name == 'master' || github.ref_name == 'prod'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.API_IMAGE }}:${{ env.TAG }}

  build-ui-image:
    needs: [changes]
    if: needs.changes.outputs.ui == 'true' || github.ref_name == 'master' || github.ref_name == 'prod'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.ui
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.UI_IMAGE }}:${{ env.TAG }}

  build-nginx:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.nginx
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.NGINX_IMAGE }}:${{ env.TAG }}

  deploy-app:
    needs: [build-api-image, build-ui-image, build-nginx]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (github.ref_name == 'master' || github.ref_name == 'prod')
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'prod' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write secrets to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/antipratik-${{ env.TAG }}
            printf 'SERVER_NAME=%s\n'                     '${{ secrets.SERVER_NAME }}'                    >  /opt/antipratik-${{ env.TAG }}/.env
            printf 'ANTIPRATIK_ADMIN_PASSWORD=%s\n'       '${{ secrets.ANTIPRATIK_ADMIN_PASSWORD }}'      >> /opt/antipratik-${{ env.TAG }}/.env
            printf 'ANTIPRATIK_R2_ENDPOINT=%s\n'          '${{ secrets.ANTIPRATIK_R2_ENDPOINT }}'         >> /opt/antipratik-${{ env.TAG }}/.env
            printf 'ANTIPRATIK_R2_ACCESS_KEY_ID=%s\n'     '${{ secrets.ANTIPRATIK_R2_ACCESS_KEY_ID }}'    >> /opt/antipratik-${{ env.TAG }}/.env
            printf 'ANTIPRATIK_R2_SECRET_ACCESS_KEY=%s\n' '${{ secrets.ANTIPRATIK_R2_SECRET_ACCESS_KEY }}' >> /opt/antipratik-${{ env.TAG }}/.env
            chmod 600 /opt/antipratik-${{ env.TAG }}/.env

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          source: >-
            infrastructure/config/config.${{ env.TAG }}.yaml,
            infrastructure/compose/docker-compose.${{ env.TAG }}.yml,
            .github/scripts/deploy.sh
          target: /tmp/
          strip_components: 2

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod +x /tmp/deploy.sh
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}" \
            GHCR_USER="${{ github.actor }}" \
            /tmp/deploy.sh ${{ env.TAG }}

  deploy-sidequests:
    needs: [changes]
    if: needs.changes.outputs.sidequests == 'true' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish sidequests to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: antipratik-sidequests
          directory: sidequests
          branch: master
