name: Build

on:
  push:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-api
  UI_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-ui
  NGINX_IMAGE: ghcr.io/${{ github.repository_owner }}/antipratik-nginx
  TAG: ${{ github.ref_name == 'prod' && 'prod' || 'dev' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'app/antipratik-api/**'
              - 'docker/Dockerfile.api'
            ui:
              - 'app/antipratik-ui/**'
              - 'docker/Dockerfile.ui'

  build-api-image:
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || github.ref_name == 'master' || github.ref_name == 'prod'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.API_IMAGE }}:${{ env.TAG }}

  build-ui-image:
    needs: [changes]
    if: needs.changes.outputs.ui == 'true' || github.ref_name == 'master' || github.ref_name == 'prod'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build UI
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.ui
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.UI_IMAGE }}:${{ env.TAG }}

  build-nginx:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - if: github.ref_name == 'master' || github.ref_name == 'prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.nginx
          push: ${{ github.ref_name == 'master' || github.ref_name == 'prod' }}
          tags: ${{ env.NGINX_IMAGE }}:${{ env.TAG }}
