server:
  host: "0.0.0.0"
  port: 8080

db:
  path: "/data/antipratik.db"

site_domain: "https://antipratik.com"
admin_email: "contact@antipratik.com"
admin_password: ""

static:
  dir: ""

storage:
  backend: "r2"
  r2:
    bucket: "antipratik"
    endpoint: ""   
    access_key_id: ""
    secret_access_key: ""

logging:
  level: "warning"


broadcaster:
  resend:
    api_key: ""           # override via ANTIPRATIK_RESEND_API_KEY (secret)
    host: "smtp.resend.com"
    port: 587
    from_email: "newsletter@antipratik.com"        # e.g. "newsletter@antipratik.com"
    from_name: "AntiPratik"         # e.g. "Pratik"
