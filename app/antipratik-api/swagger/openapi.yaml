openapi: "3.0.3"
info:
  title: antipratik API
  version: "1.0.0"
  description: REST API for antipratik.com

servers:
  - url: /api

tags:
  - name: Auth
  - name: All Posts
  - name: Essays
  - name: Short Posts
  - name: Music
  - name: Photos
  - name: Videos
  - name: Link Posts
  - name: Links

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    IDResponse:
      type: object
      properties:
        id:
          type: string

    TokenResponse:
      type: object
      properties:
        token:
          type: string

    PhotoImage:
      type: object
      properties:
        url:
          type: string
        alt:
          type: string
        caption:
          type: string
          nullable: true
        thumbnailSmallUrl:
          type: string
          nullable: true
        thumbnailMediumUrl:
          type: string
          nullable: true
        thumbnailLargeUrl:
          type: string
          nullable: true


    EssayPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [essay]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        body:
          type: string
        readingTimeMinutes:
          type: integer

    ShortPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [short]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        body:
          type: string

    MusicPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [music]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        title:
          type: string
        albumArt:
          type: string
        audioUrl:
          type: string
        duration:
          type: integer
        album:
          type: string
          nullable: true

    PhotoPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [photo]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: "#/components/schemas/PhotoImage"
        location:
          type: string
          nullable: true

    VideoPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [video]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        title:
          type: string
        thumbnailUrl:
          type: string
        videoUrl:
          type: string
        duration:
          type: integer
        playlist:
          type: string
          nullable: true

    LinkPost:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [link]
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        title:
          type: string
        url:
          type: string
        domain:
          type: string
        description:
          type: string
          nullable: true
        thumbnailUrl:
          type: string
          nullable: true
        category:
          type: string
          enum: [music, writing, video, social]
          nullable: true

    Post:
      oneOf:
        - $ref: "#/components/schemas/EssayPost"
        - $ref: "#/components/schemas/ShortPost"
        - $ref: "#/components/schemas/MusicPost"
        - $ref: "#/components/schemas/PhotoPost"
        - $ref: "#/components/schemas/VideoPost"
        - $ref: "#/components/schemas/LinkPost"
      discriminator:
        propertyName: type

    ExternalLink:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        url:
          type: string
        domain:
          type: string
        description:
          type: string
        featured:
          type: boolean
        category:
          type: string
          enum: [music, writing, video, social]

    CreateEssayPost:
      type: object
      required: [title, slug, excerpt, body]
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string

    UpdateEssayPost:
      type: object
      description: All fields are optional. Omitted fields retain their current values. tags null = keep existing; tags [] = clear all; tags [...] = replace.
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        body:
          type: string
        tags:
          type: array
          nullable: true
          items:
            type: string

    UpdateShortPost:
      type: object
      description: All fields are optional. tags null = keep existing; tags [] = clear all.
      properties:
        body:
          type: string
        tags:
          type: array
          nullable: true
          items:
            type: string

    UpdateExternalLink:
      type: object
      description: All fields are optional. Omitted fields retain their current values.
      properties:
        title:
          type: string
        url:
          type: string
          description: Must be a valid absolute URL. The domain is derived server-side.
        description:
          type: string
        featured:
          type: boolean
        category:
          type: string
          enum: [music, writing, video, social]

    CreateShortPost:
      type: object
      required: [body]
      properties:
        body:
          type: string
        tags:
          type: array
          items:
            type: string

    CreateMusicPost:
      type: object
      required: [title, albumArt, audioURL, duration]
      properties:
        title:
          type: string
        albumArt:
          type: string
        audioURL:
          type: string
        duration:
          type: integer
        album:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    CreatePhotoPost:
      type: object
      required: [images]
      properties:
        images:
          type: array
          items:
            $ref: "#/components/schemas/PhotoImage"
        location:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    CreateVideoPost:
      type: object
      required: [title, thumbnailURL, videoURL, duration]
      properties:
        title:
          type: string
        thumbnailURL:
          type: string
        videoURL:
          type: string
        duration:
          type: integer
        playlist:
          type: string
          nullable: true
        tags:
          type: array
          items:
            type: string

    CreateLinkPost:
      type: object
      required: [title, url]
      properties:
        title:
          type: string
        url:
          type: string
          description: Must be a valid absolute URL (e.g. https://example.com/path). The domain is derived server-side.
        description:
          type: string
          nullable: true
        thumbnailURL:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
          enum: [music, writing, video, social]
        tags:
          type: array
          items:
            type: string

    CreateExternalLink:
      type: object
      required: [title, url, description, category]
      properties:
        title:
          type: string
        url:
          type: string
          description: Must be a valid absolute URL. The domain is derived server-side.
        description:
          type: string
        featured:
          type: boolean
          default: false
        category:
          type: string
          enum: [music, writing, video, social]

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts:
    get:
      tags: [All Posts]
      summary: List posts
      parameters:
        - name: type
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [essay, short, music, photo, video, link]
          style: form
          explode: true
        - name: tag
          in: query
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
      responses:
        "200":
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"

  /posts/{slug}:
    get:
      tags: [Essays]
      summary: Get essay by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Essay post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EssayPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/essay:
    post:
      tags: [Essays]
      summary: Create essay post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEssayPost"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EssayPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/essay/{id}:
    put:
      tags: [Essays]
      summary: Update essay post (partial)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEssayPost"
      responses:
        "200":
          description: Updated essay post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EssayPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/short:
    post:
      tags: [Short Posts]
      summary: Create short post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShortPost"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortPost"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/short/{id}:
    put:
      tags: [Short Posts]
      summary: Update short post (partial)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShortPost"
      responses:
        "200":
          description: Updated short post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShortPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/music:
    post:
      tags: [Music]
      summary: Create music post (with file upload)
      description: |
        Accepts `multipart/form-data`. Stores the audio file (and optional album art)
        and creates the post in one request. File IDs follow `<postId>.<ext>`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [audioFile, title, duration]
              properties:
                audioFile:
                  type: string
                  format: binary
                  description: "Audio file — allowed: mp3, wav, ogg, m4a"
                albumArtFile:
                  type: string
                  format: binary
                  description: "Album art image (optional) — allowed: jpg, jpeg, png, webp"
                title:
                  type: string
                duration:
                  type: integer
                  description: Duration in seconds
                album:
                  type: string
                  description: Album name (optional)
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/music/{id}:
    put:
      tags: [Music]
      summary: Update music post (partial)
      description: All fields are optional. Omit a field to keep its current value. tags absent = keep; tags present (even empty) = replace entirely.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                duration:
                  type: integer
                album:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                  description: Omit to keep existing tags; send empty to clear all
      responses:
        "200":
          description: Updated music post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MusicPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/photo:
    post:
      tags: [Photos]
      summary: Create photo post (with file upload)
      description: |
        Accepts `multipart/form-data`. Upload one or more image files as `images[]`.
        Thumbnails (300/600/1200px) are generated automatically. Provide parallel
        `alt[]` and optional `caption[]` arrays matching image order.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: "Image files — allowed: jpg, jpeg, png, webp"
                alt:
                  type: array
                  items:
                    type: string
                  description: Alt text for each image (parallel to images[])
                caption:
                  type: array
                  items:
                    type: string
                  description: Optional caption for each image (parallel to images[])
                location:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/photo/{id}:
    put:
      tags: [Photos]
      summary: Update photo post (partial)
      description: All fields optional. images absent = keep existing; images provided = replace entirely. tags absent = keep; tags present (even empty) = replace.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                location:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                  description: Omit to keep existing tags; send empty to clear all
      responses:
        "200":
          description: Updated photo post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotoPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/video:
    post:
      tags: [Videos]
      summary: Create video post (with optional thumbnail upload)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, videoURL, duration]
              properties:
                thumbnailFile:
                  type: string
                  format: binary
                  description: "Thumbnail image (optional) — allowed: jpg, jpeg, png, webp"
                title:
                  type: string
                videoURL:
                  type: string
                duration:
                  type: integer
                playlist:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/video/{id}:
    put:
      tags: [Videos]
      summary: Update video post (partial)
      description: All fields optional. Omit to keep current value. tags absent = keep; tags present (even empty) = replace.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                videoURL:
                  type: string
                duration:
                  type: integer
                playlist:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                  description: Omit to keep existing tags; send empty to clear all
      responses:
        "200":
          description: Updated video post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/link:
    post:
      tags: [Link Posts]
      summary: Create link post (with optional thumbnail upload)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, url]
              properties:
                thumbnailFile:
                  type: string
                  format: binary
                  description: "Thumbnail image (optional) — allowed: jpg, jpeg, png, webp"
                title:
                  type: string
                url:
                  type: string
                  description: Must be a valid absolute URL. The domain is derived server-side.
                description:
                  type: string
                category:
                  type: string
                  enum: [music, writing, video, social]
                tags:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/link/{id}:
    put:
      tags: [Link Posts]
      summary: Update link post (partial)
      description: All fields optional. Omit to keep current value. tags absent = keep; tags present (even empty) = replace.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                url:
                  type: string
                  description: Must be a valid absolute URL. The domain is derived server-side.
                description:
                  type: string
                category:
                  type: string
                  enum: [music, writing, video, social]
                tags:
                  type: array
                  items:
                    type: string
                  description: Omit to keep existing tags; send empty to clear all
      responses:
        "200":
          description: Updated link post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LinkPost"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /posts/{id}:
    delete:
      tags: [All Posts]
      summary: Delete any post by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /links:
    get:
      tags: [Links]
      summary: List all external links
      responses:
        "200":
          description: List of links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalLink"
    post:
      tags: [Links]
      summary: Create external link
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExternalLink"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IDResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /links/featured:
    get:
      tags: [Links]
      summary: List featured external links (up to 4)
      responses:
        "200":
          description: Featured links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExternalLink"

  /links/{id}:
    put:
      tags: [Links]
      summary: Update external link (partial)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExternalLink"
      responses:
        "200":
          description: Updated external link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalLink"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Links]
      summary: Delete external link
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # File-serving endpoints live outside /api — override server at path level.
  /files/{fileId}:
    servers:
      - url: /
    get:
      summary: Retrieve an uploaded file (photo or audio)
      description: |
        Streams the original binary content of an uploaded file.
        The `fileId` must match the pattern returned by upload endpoints (`<postId>.<ext>`).
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
          description: "File ID in the format <postId>.<ext>"
      responses:
        "200":
          description: File binary content
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            audio/mpeg:
              schema:
                type: string
                format: binary
            audio/wav:
              schema:
                type: string
                format: binary
            audio/ogg:
              schema:
                type: string
                format: binary
            audio/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /thumbnails/{thumbnailId}:
    servers:
      - url: /
    get:
      summary: Retrieve a photo thumbnail
      description: |
        Streams the binary content of a generated thumbnail image.
        Thumbnail IDs follow the pattern `<postId>-<size>.<ext>` where size is
        one of `small` (300px), `medium` (600px), or `large` (1200px).
      parameters:
        - name: thumbnailId
          in: path
          required: true
          schema:
            type: string
          description: "Thumbnail ID in the format <postId>-<size>.<ext>"
      responses:
        "200":
          description: Thumbnail image binary content
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        "404":
          description: Thumbnail not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health:
    get:
      tags: [System]
      summary: Health check
      responses:
        "200":
          description: Service is healthy

  /tags:
    get:
      tags: [All Posts]
      summary: Get all tags
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /subscribe:
    post:
      tags: [Broadcaster]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  default: email
                address:
                  type: string
      responses:
        "201":
          description: Subscribed successfully

  /contact:
    post:
      tags: [Broadcaster]
      summary: Send a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, message]
              properties:
                name:
                  type: string
                email:
                  type: string
                message:
                  type: string
      responses:
        "200":
          description: Message sent

  /confirm:
    get:
      tags: [Broadcaster]
      summary: Confirm a subscription
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Confirmation successful
        "404":
          description: Token not found

  /unsubscribe:
    get:
      tags: [Broadcaster]
      summary: Unsubscribe from newsletter
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Unsubscribed successful
        "404":
          description: Token not found

  /posts/{id}/images:
    post:
      tags: [Photos]
      summary: Add an image to a photo post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                alt:
                  type: string
                caption:
                  type: string
      responses:
        "201":
          description: Image added

  /posts/{id}/images/{imageID}:
    get:
      tags: [Photos]
      summary: Get a specific photo image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: imageID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Photo image details
    put:
      tags: [Photos]
      summary: Update a photo image
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: imageID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                alt:
                  type: string
                caption:
                  type: string
      responses:
        "200":
          description: Image updated
    delete:
      tags: [Photos]
      summary: Delete a photo image
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: imageID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Image deleted

  /broadcasts:
    get:
      tags: [Broadcaster]
      summary: List broadcasts
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            default: email
      responses:
        "200":
          description: List of broadcasts
    post:
      tags: [Broadcaster]
      summary: Create a broadcast
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title]
              properties:
                type:
                  type: string
                title:
                  type: string
                data:
                  type: object
                  properties:
                    caption:
                      type: string
                    postIDs:
                      type: array
                      items:
                        type: string
      responses:
        "201":
          description: Broadcast created

  /broadcasts/{id}:
    put:
      tags: [Broadcaster]
      summary: Update a broadcast
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                data:
                  type: object
                  properties:
                    caption:
                      type: string
                    postIDs:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Broadcast updated
    delete:
      tags: [Broadcaster]
      summary: Delete a broadcast and its send records
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Broadcast deleted
        "404":
          description: Broadcast not found
        "401":
          description: Unauthorized

  /broadcasts/{id}/sends:
    get:
      tags: [Broadcaster]
      summary: List per-subscriber send details for a broadcast
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-subscriber send records
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    address:
                      type: string
                      description: Subscriber email address
                    status:
                      type: string
                      enum: [BUFFERED, SUCCESS, FAILED]
                    message:
                      type: string
                      description: Error message if status is FAILED
                    scheduledAt:
                      type: string
                      format: date-time
                    sentAt:
                      type: string
                      format: date-time
        "404":
          description: Broadcast not found

  /broadcasts/{id}/dispatch:
    post:
      tags: [Broadcaster]
      summary: Dispatch a broadcast
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Broadcast dispatched

  /subscribers/resend-confirmation:
    post:
      tags: [Broadcaster]
      summary: Resend confirmation emails
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  default: email
      responses:
        "200":
          description: Confirmation emails resent

  /subscribers/{address}:
    delete:
      tags: [Broadcaster]
      summary: Hard-delete a subscriber by email address
      security:
        - bearerAuth: []
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Subscriber deleted
        "404":
          description: Subscriber not found

  /subscribers:
    get:
      tags: [Broadcaster]
      summary: List all subscribers
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            default: email
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    address:
                      type: string
                    confirmed:
                      type: boolean
                    createdAt:
                      type: string
                      format: date-time
                    confirmedAt:
                      type: string
                      format: date-time
                    unsubscribedAt:
                      type: string
                      format: date-time
